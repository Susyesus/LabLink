# ==========================================
# LabLink - Application Properties (Base)
# ==========================================
spring.application.name=lablink-backend
spring.profiles.active=dev

# ==========================================
# JPA / Hibernate
# ==========================================
# none = Hibernate does ZERO schema work — we manage schema manually via Supabase SQL editor.
# This is the correct setting when connecting through PgBouncer (transaction pooler)
# because schema introspection queries (used by create/update/validate) can fail mid-pool.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Prevent Hibernate from trying to look up JDBC metadata through the pooler
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ==========================================
# Jackson
# ==========================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# ==========================================
# JWT
# ==========================================
app.jwt.secret=${JWT_SECRET:bXlTdXBlclNlY3JldEtleUZvckxhYkxpbmtBcHAxMjM0NTY=}
app.jwt.access-token-expiry-ms=900000
app.jwt.refresh-token-expiry-ms=604800000
