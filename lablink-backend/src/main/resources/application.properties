# ==========================================
# LabLink - Application Properties (Base)
# ==========================================
spring.application.name=lablink-backend
spring.profiles.active=dev

# ==========================================
# JPA / Hibernate
# ==========================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# ==========================================
# Database Connection (Mapped from .env)
# ==========================================
spring.datasource.url=${SUPABASE_DB_URL}
spring.datasource.username=${SUPABASE_DB_USER}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Supabase uses SSL — required for all connections
spring.datasource.hikari.data-source-properties.ssl=true
spring.datasource.hikari.data-source-properties.sslmode=require

# ==========================================
# Jackson (serialize enums as strings)
# ==========================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# ==========================================
# JWT Configuration
# ==========================================
# IMPORTANT: Always override via SUPABASE_JWT_SECRET env var in production.
# Minimum 256-bit (32-char) Base64-encoded secret.
app.jwt.secret=${JWT_SECRET:bXlTdXBlclNlY3JldEtleUZvckxhYkxpbmtBcHAxMjM0NTY=}
app.jwt.access-token-expiry-ms=900000
app.jwt.refresh-token-expiry-ms=604800000

# ==========================================
# API Rate Limiting
# ==========================================
app.rate-limit.requests-per-minute=100
